name: Deploy to Azure App Service (Django)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Optional sanity checks (keep/remove as you like)
      - name: Django check
        run: python manage.py check
        env:
          DJANGO_SETTINGS_MODULE: ${{ secrets.DJANGO_SETTINGS_MODULE }}

      # Optional tests (keep/remove as you like)
      - name: Run tests
        run: python manage.py test
        env:
          DJANGO_SETTINGS_MODULE: ${{ secrets.DJANGO_SETTINGS_MODULE }}

      # If you use whitenoise or otherwise serve static files from the app:
      - name: Collect static
        run: python manage.py collectstatic --noinput
        env:
          DJANGO_SETTINGS_MODULE: ${{ secrets.DJANGO_SETTINGS_MODULE }}

      - name: Create deployment package
        run: |
          # Zip the repo contents for Zip Deploy (exclude venv, git, etc.)
          zip -r app.zip . -x ".git/*" ".github/*" "**/__pycache__/*" "*.pyc" "venv/*" ".venv/*"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: app.zip
