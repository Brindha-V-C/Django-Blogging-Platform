{% extends 'base.html' %}

{% block content %}

{% load crispy_forms_tags %}

<div class="row">

    <!--Left Sidebar-->

    {% include 'dashboard/sidebar.html' %}

    <!--Right Sidebar-->

    <div class="col-md-9">
        {% if perms.auth.view_user %}
        <h2> Edit User</h2>
        <br>

        <form action="{% url 'edit_user' user.pk %}" method="POST">

            {% csrf_token %}
            {{ form | crispy }}

            <button type="submit" class="btn btn-warning">Update</button>

        </form>
        <br>
        {% else %}
        <h5>You do not have permission to view this page</h5>
        {% endif %}
    </div>

</div>

{% endblock %}
