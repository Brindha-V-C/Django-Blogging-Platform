{% extends 'base.html' %}

{% block content %}

<div class="row">

    <!--Left Sidebar-->

    {% include 'dashboard/sidebar.html' %}

    <!--Right Sidebar-->

    <div class="col-md-9">
        <h2> All Categories</h2>
        <a href="{% url 'add_category' %}" class="btn btn-warning text-dark float-right mb-2">Add New</a>
        <br>
        <table class="table table-hover">
            <thead>
                <tr>
                <th>#</th>
                <th>Category Name</th>
                <th>Created At</th>
                <th>Updated At</th>
                <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for cat in categories%}
                <tr>
                    <th>{{ forloop.counter }}</th>
                    <td>{{ cat }}</td>
                    <td>{{ cat.created_at }}</td>
                    <td>{{ cat.updated_at }}</td>
                    <td>
                       <a href="{% url 'edit_category' cat.pk %}"><i class="fa fa-edit text-success"></i></a>
                       &nbsp;
                       <a href="{% url 'delete_category' cat.pk %}"><i class="fa fa-trash text-danger"></i></a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

{% endblock %}
